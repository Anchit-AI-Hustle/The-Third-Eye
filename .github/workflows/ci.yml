name: CI
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
        env:
          GEMINI_API_KEY: ci-placeholder
          NEXTAUTH_SECRET: ci-placeholder
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: ruff check app
      - run: pytest --cov=app -q --maxfail=1
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-with-at-least-32-chars
          FINANCIAL_ENCRYPTION_KEY: test-financial-key-with-32-characters
          DATABASE_URL: sqlite+aiosqlite://:memory:
          REDIS_URL: redis://localhost:6379/0
          NEXTAUTH_SECRET: test-nextauth-secret-with-32-chars
          GOOGLE_AI_API_KEY: test-google-ai-key
