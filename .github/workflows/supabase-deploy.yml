name: Deploy Supabase migrations

# Applies database migrations to the linked Supabase project whenever a
# migration file lands on main — the CLI step you'd otherwise run by hand.
# Also (optionally) pings a Vercel deploy hook so the site rebuilds in lock-step.
#
# Optional setup — add these in GitHub → Settings → Secrets and variables → Actions:
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — your project's database password
#   VERCEL_DEPLOY_HOOK     — (optional) a Deploy Hook URL from Vercel → Settings → Git → Deploy Hooks
#
# If the Supabase secrets are absent, the workflow SKIPS the migration (a clean
# success with a notice) instead of failing — so a push never shows a red
# "deployment error". Vercel's Git integration deploys the app independently.

on:
  push:
    branches: [main]
    paths:
      - "frontend/supabase/migrations/**"
  workflow_dispatch: {}

# Least privilege: this workflow only checks out code and calls external CLIs
# (Supabase, curl) — it never writes back to the repo.
permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: cnbxarfuyicyjbtvbmtv
    steps:
      - uses: actions/checkout@v4

      - name: Check for migration secrets
        id: check
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase secrets not set — skipping automated migration. Add SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD to enable it. Apply migrations manually with 'supabase db push' until then."
          fi

      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.ready == 'true'
        with:
          version: latest

      - name: Link project
        if: steps.check.outputs.ready == 'true'
        working-directory: frontend
        run: supabase link --project-ref "$PROJECT_ID"

      - name: Push migrations
        if: steps.check.outputs.ready == 'true'
        working-directory: frontend
        run: supabase db push

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook (optional)
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "Triggering Vercel deploy hook…"
            curl -sS -X POST "$HOOK" && echo "Deploy triggered."
          else
            echo "No VERCEL_DEPLOY_HOOK secret set — skipping."
            echo "Vercel's Git integration already auto-deploys main (git.deploymentEnabled), so this is only a fallback."
          fi
