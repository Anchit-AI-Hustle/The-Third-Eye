<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>JARVIS OS</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0A0A0F; color: #E7ECF3;
        font-family: system-ui, -apple-system, sans-serif; }
      .wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
      .ring { width: 46px; height: 46px; border: 3px solid rgba(79,195,247,.25); border-top-color: #4FC3F7;
        border-radius: 50%; animation: spin 0.9s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .name { font-weight: 700; letter-spacing: .18em; font-size: 14px; color: #4FC3F7; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="ring"></div>
      <div class="name">J.A.R.V.I.S.</div>
    </div>
    <!-- Capacitor loads the live app via server.url; this is only shown briefly. -->
  </body>
</html>
